<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小森林兒科 - 沖繩5日員工旅遊</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Config for Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pms292: '#69B3E7', // PMS 292 approx
                        pmsLight: '#E0F2FE',
                        cream: '#FDFBF7',  // Soft Cream
                        creamDark: '#F5F0E6',
                        pastelYellow: '#FEF3C7',
                        pastelPink: '#FCE7F3',
                        textMain: '#4A5568', // Softer black
                        textLight: '#A0AEC0',
                        oceanBlue: '#A5D8F3',
                        deepOcean: '#69B3E7',
                        // Meal colors
                        mealBreakfast: '#FEF9C3', // Light Yellow
                        mealLunch: '#FFEDD5',     // Light Orange
                        mealDinner: '#E0E7FF',    // Light Indigo
                        treeGreen: '#48BB78',
                        treeBrown: '#8B4513',
                    },
                    fontFamily: {
                        sans: ['"Zen Maru Gothic"', '"Noto Sans TC"', 'sans-serif'],
                    },
                    borderRadius: {
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Zen Maru Gothic for rounded feel -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
            background-color: #FDFBF7; /* Cream background */
            overflow-x: hidden; /* Prevent horizontal scrollbar due to animations */
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(105, 179, 231, 0.1), 0 2px 4px -1px rgba(105, 179, 231, 0.06);
        }
        
        /* --- Top Header Animations --- */
        /* Sun Rotation */
        .spin-slow {
            animation: spin 30s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Cloud Drifting */
        @keyframes drift {
            from { transform: translateX(-150%); }
            to { transform: translateX(450%); }
        }
        .drift-slow {
            animation: drift 80s linear infinite;
        }
        .drift-medium {
            animation: drift 60s linear infinite;
        }

        /* Tree Swaying */
        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        .sway {
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite;
        }


        /* --- Bottom Footer Animations --- */
        /* Wave Animations */
        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .wave-back {
            animation: wave 15s linear infinite;
        }
        .wave-front {
            animation: wave 10s linear infinite;
        }

        /* Whale Shark Swimming Right (Head Forward) */
        @keyframes swimRight {
             0% { transform: translateX(-30vw) translateY(0) rotate(1deg); }
            25% { transform: translateX(20vw) translateY(15px) rotate(-1deg); }
            50% { transform: translateX(60vw) translateY(0) rotate(1deg); }
            75% { transform: translateX(100vw) translateY(-15px) rotate(-1deg); }
            100% { transform: translateX(140vw) translateY(0) rotate(1deg); }
        }
        .whale-shark-right {
            position: absolute;
            animation: swimRight 50s linear infinite; 
            opacity: 0.9;
            filter: drop-shadow(0 4px 4px rgba(105, 179, 231, 0.3));
            will-change: transform; 
        }
    </style>
</head>
<body>

        const Card = ({ item }) => {
            const isFlight = item.type === 'flight';
            const isHotel = item.type === 'hotel';
            const isBreakfast = item.type === 'breakfast';
            const isLunch = item.type === 'lunch';
            const isDinner = item.type === 'dinner';
            
            let bgColor = 'bg-white/95'; 
            let iconColor = 'text-pms292';
            let iconBg = 'bg-blue-50';
            let textColor = 'text-textMain';
            let descColor = 'text-textLight';
            
            if (isFlight) {
                bgColor = 'bg-blue-50/95';
                iconBg = 'bg-white';
            } else if (isHotel) {
                iconColor = 'text-indigo-400';
                iconBg = 'bg-indigo-50';
            } else if (isBreakfast) {
                bgColor = 'bg-mealBreakfast';
                iconColor = 'text-yellow-600';
                iconBg = 'bg-white/60';
                textColor = 'text-yellow-900';
                descColor = 'text-yellow-700/80';
            } else if (isLunch) {
                bgColor = 'bg-mealLunch';
                iconColor = 'text-orange-600';
                iconBg = 'bg-white/60';
                textColor = 'text-orange-900';
                descColor = 'text-orange-700/80';
            } else if (isDinner) {
                bgColor = 'bg-mealDinner';
                iconColor = 'text-indigo-600';
                iconBg = 'bg-white/60';
                textColor = 'text-indigo-900';
                descColor = 'text-indigo-700/80';
            }

            return (
                <div className={`mb-3 rounded-2xl ${bgColor} backdrop-blur-sm card-shadow overflow-hidden transform transition-all duration-300 hover:scale-[1.01] hover:-translate-y-0.5 min-h-[90px] flex flex-col justify-center`}>
                    <div className={`p-4 flex gap-4 items-center`}>
                        <div className={`flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-2xl ${iconBg} ${iconColor}`}>
                            {item.icon}
                        </div>
                        <div className="flex-grow">
                            <h3 className={`font-bold text-lg ${textColor} mb-1 leading-tight`}>{item.title}</h3>
                            {item.time && (
                                <div className="inline-block px-3 py-1 rounded-full bg-pms292 text-white text-xs font-bold mb-2">
                                    {item.time}
                                </div>
                            )}
                            <p className={`${descColor} text-sm leading-relaxed tracking-wide font-medium`}>{item.desc}</p>

        const BackgroundAnimation = () => {
            return (
                <div className="fixed bottom-0 left-0 w-full h-[30vh] -z-0 pointer-events-none overflow-hidden">
                    
                    {/* Whale Shark Parent (Leading) */}
                    <div className="whale-shark-right" style={{ width: '160px', zIndex: 5, bottom: '60px', left: '0' }}>
                        <WhaleSharkIcon />
                    </div>

                    {/* Whale Shark Baby (Following) */}
                    <div className="whale-shark-right" style={{ width: '90px', zIndex: 4, bottom: '40px', left: '-120px', animationDelay: '0.1s' }}>
                        <WhaleSharkIcon />
                    </div>

                    {/* Back Wave */}
                    <div className="absolute bottom-0 left-0 w-[200%] h-full flex opacity-40">
                         <svg className="w-full h-full wave-back" viewBox="0 0 1440 320" preserveAspectRatio="none">
                            <path fill="#A5D8F3" fillOpacity="1" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,261.3C960,256,1056,224,1152,197.3C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                        </svg>
                         <svg className="w-full h-full wave-back" viewBox="0 0 1440 320" preserveAspectRatio="none">
                            <path fill="#A5D8F3" fillOpacity="1" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,261.3C960,256,1056,224,1152,197.3C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                        </svg>
                    </div>

                    {/* Front Wave */}
                    <div className="absolute bottom-[-10px] left-0 w-[200%] h-full flex opacity-60">
                         <svg className="w-full h-full wave-front" viewBox="0 0 1440 320" preserveAspectRatio="none">
                            <path fill="#69B3E7" fillOpacity="1" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                        </svg>
                         <svg className="w-full h-full wave-front" viewBox="0 0 1440 320" preserveAspectRatio="none">
                            <path fill="#69B3E7" fillOpacity="1" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                        </svg>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(0);

            return (
                <div className="min-h-screen pb-24 bg-cream relative">
                    
                    {/* Cute Header Section */}
                    <header className="relative bg-pms292 pt-8 pb-16 px-6 overflow-hidden rounded-b-[3rem] shadow-lg z-10">
                        {/* Background Decor - Animated */}
                        <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                            {/* Spinning Sun */}
                            <SunDecor className="absolute top-6 right-10 w-24 h-24 text-yellow-300 opacity-90 spin-slow" />
                            
                            {/* Drifting Clouds */}
                            <div className="absolute top-0 left-0 w-full h-full">
                                 <CloudIcon className="absolute top-8 w-28 h-28 text-white opacity-25 drift-slow" style={{animationDelay: '0s', left: '-10%'}} />
                                 <CloudIcon className="absolute top-20 w-16 h-16 text-white opacity-20 drift-medium" style={{animationDelay: '-20s', left: '10%'}} />
                                 <CloudIcon className="absolute top-12 w-20 h-20 text-white opacity-20 drift-slow" style={{animationDelay: '-40s', left: '60%'}} />
                            </div>
                            
                            {/* Swaying Trees on horizon */}
                            <div className="absolute bottom-14 left-0 w-full flex justify-around opacity-30 px-2">
                                 <TreeIcon className="w-8 h-8 sway" style={{animationDelay: '0s'}} />
                                 <TreeIcon className="w-6 h-6 sway" style={{animationDelay: '-1.5s'}} />
                                 <TreeIcon className="w-10 h-10 sway" style={{animationDelay: '-0.5s'}} />
                                 <TreeIcon className="w-7 h-7 sway" style={{animationDelay: '-2.5s'}} />
                                 <TreeIcon className="w-9 h-9 sway" style={{animationDelay: '-1s'}} />
                            </div>
                            
                            {/* Plane path */}
                             <div className="absolute top-24 left-0 w-full opacity-40">
                                <svg className="w-full h-20" viewBox="0 0 300 50">
                                    <path d="M-10,40 Q150,-20 310,40" fill="none" stroke="white" strokeWidth="2" strokeDasharray="8 8" />
                                </svg>
                                <div className="absolute top-4 left-2/3 transform -rotate-12">
                                     <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                                        <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <div className="relative z-10 text-center text-white mt-4">
                            <div className="inline-block px-4 py-1 rounded-full bg-white/20 backdrop-blur-sm text-sm font-bold tracking-widest mb-3 shadow-sm">
                                員工旅遊 2026
                            </div>
                            <h1 className="text-3xl font-bold tracking-wide mb-2 drop-shadow-md">小森林兒科</h1>
                            <p className="text-lg opacity-95 font-medium flex justify-center items-center gap-2">
                                <span>沖繩</span>
                                <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                                <span>五日遊</span>
                            </p>
                        </div>
                    </header>
                    
                    {/* Floating Date Navigation */}
                    <div className="px-4 -mt-8 relative z-20">
                         <div className="bg-white rounded-[2rem] p-2 shadow-xl flex overflow-x-auto hide-scrollbar space-x-2">
                            {itineraryData.map((day, index) => (
                                <button
                                    key={index}
                                    onClick={() => setActiveTab(index)}
                                    className={`flex-shrink-0 flex flex-col items-center justify-center w-[4.5rem] h-20 rounded-2xl transition-all duration-300
                                        ${activeTab === index 
                                            ? 'bg-pms292 text-white shadow-md transform scale-105' 
                                            : 'bg-transparent text-gray-400 hover:bg-gray-50'
                                        }`}
                                >
                                    <span className="text-xs font-bold opacity-80">{day.weekday}</span>
                                    <span className="text-lg font-bold">{day.date}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Content */}
                    <main className="max-w-xl mx-auto px-5 pt-8 z-10 relative">
                        
                        {/* Day Title with decorations */}
                        <div className="mb-6 text-center animate-fade-in relative">
                            <div className="inline-block relative">
                                <span className="absolute -left-6 -top-2 text-2xl animate-pulse">✨</span>
                                <h2 className="text-2xl font-bold text-textMain px-4 relative z-10">
                                    {itineraryData[activeTab].title}
                                </h2>
                                <span className="absolute -right-6 -bottom-1 text-2xl animate-pulse delay-75">✨</span>
                                <div className="h-3 w-full bg-yellow-200/60 absolute bottom-1 left-0 -z-0 rounded-full"></div>
                            </div>
                        </div>

                        {/* Cards Container */}
                        <div className="space-y-4">
                            {itineraryData[activeTab].items.map((item, idx) => (
                                <Card key={idx} item={item} />
                            ))}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="mt-8 text-center text-xs text-textLight pb-8 px-6 relative z-10">
                        <div className="w-full h-px bg-gray-200/50 mb-6"></div>
                        <p className="font-medium bg-white/50 inline-block px-4 py-1 rounded-full backdrop-blur-sm">祝您旅途愉快 Konnichiwa Okinawa!</p>
                    </footer>

                    {/* Background Animation - Placed at the end to be visually at bottom but z-index handles layering */}
                    <BackgroundAnimation />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
